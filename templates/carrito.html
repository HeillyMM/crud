<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Carrito</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">

<div class="container mt-5">
    <div class="card shadow">
        <div class="card-header bg-dark text-white d-flex justify-content-between">
            <h4>Carrito de compras</h4>
            <a href="/" class="btn btn-light btn-sm">Seguir comprando</a>
        </div>

        <div class="card-body">

            {% if carrito %}
            <table class="table table-bordered table-striped align-middle">
                <thead class="table-dark">
                    <tr>
                        <th>Producto</th>
                        <th>Precio</th>
                        <th>Cantidad</th>
                        <th>Subtotal</th>
                        <th></th>
                    </tr>
                </thead>

                <tbody>
                    {% for item in carrito %}
                    <tr>
                        <td>{{ item.nombre }}</td>
                        <td>${{ item.precio }}</td>
                        <td>{{ item.cantidad }}</td>
                        <td>${{ item.subtotal }}</td>
                        <td>
                            <a href="/eliminar/{{ loop.index0 }}" class="btn btn-danger btn-sm">
                                Eliminar
                            </a>
                        </td>
                    </tr>
                    {% endfor %}
                </tbody>
            </table>

            <div class="d-flex justify-content-between">
                <h4>Total: ${{ total }}</h4>

                <div>
                    <a href="/vaciar" class="btn btn-warning">Vaciar carrito</a>
                </div>
            </div>

            {% else %}
                <div class="alert alert-info">
                    El carrito está vacío
                </div>
            {% endif %}

        </div>
    </div>
</div>

</body>
</html>
